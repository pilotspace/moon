name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy -- -D warnings
      - name: Clippy (tokio runtime)
        run: cargo clippy --no-default-features --features runtime-tokio,jemalloc -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test --lib --no-default-features --features runtime-tokio,jemalloc
        timeout-minutes: 15
        env:
          MOON_NO_URING: "1"
      - name: Integration tests (server-spawning)
        run: cargo test --no-default-features --features runtime-tokio,jemalloc --test integration --test replication_test
        timeout-minutes: 5
        env:
          MOON_NO_URING: "1"

  safety-audit:
    name: Safety Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit unsafe blocks for SAFETY comments
        run: bash scripts/audit-unsafe.sh
      - name: Audit unwrap/expect ratchet
        run: bash scripts/audit-unwrap.sh

  changelog:
    name: CHANGELOG check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md touched or skip-changelog label present
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if echo "$PR_LABELS" | grep -q 'skip-changelog'; then
            echo "skip-changelog label found — skipping check"
            exit 0
          fi
          if git diff origin/main...HEAD --name-only | grep -q CHANGELOG.md; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md not updated under [Unreleased]. Add a changelog entry or apply the 'skip-changelog' label."
            exit 1
          fi

  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny and cargo-audit
        run: cargo install cargo-deny cargo-audit
      - name: cargo deny check
        run: cargo deny check
      - name: cargo audit
        run: cargo audit

  redis-compat:
    name: Redis Compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
        env:
          MOON_NO_URING: "1"
      - name: Run redis_compat integration tests
        run: |
          ./target/release/moon --port 6399 --shards 1 &
          sleep 2
          # TODO: Remove --skip flags when stream commands (XADD, XRANGE, XTRIM) are implemented.
          # Tracked in ROADMAP as stream support milestone.
          MOON_TEST_PORT=6399 cargo test --release --no-default-features --features runtime-tokio,jemalloc --test redis_compat -- --ignored --skip xadd --skip xrange --skip xtrim
        timeout-minutes: 5
        env:
          MOON_NO_URING: "1"

  loom:
    name: Loom Model Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Run loom exhaustive exploration
        run: cargo test --no-default-features --features runtime-tokio,jemalloc --test loom_response_slot
        timeout-minutes: 5
        env:
          MOON_NO_URING: "1"
          RUSTFLAGS: "--cfg loom"

  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features --features runtime-tokio
