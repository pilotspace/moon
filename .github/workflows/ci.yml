name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MOON_NO_URING: "1"

jobs:
  # ── Fast gate: no compilation needed (~10s) ─────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt --check
      - run: bash scripts/audit-unsafe.sh
      - run: bash scripts/audit-unwrap.sh
      - name: CHANGELOG check
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Fetch labels live — the event payload snapshots labels at trigger
          # time, so a label applied after `gh pr create` is invisible to it.
          PR_LABELS=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" --jq '[.[].name] | join(",")' || echo "")
          if echo "$PR_LABELS" | grep -q 'skip-changelog'; then
            echo "skip-changelog label found — skipping"
            exit 0
          fi
          if git diff --name-only "${BASE_SHA}...${HEAD_SHA}" | grep -q CHANGELOG.md; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md not updated. Add an entry or apply 'skip-changelog' label."
            exit 1
          fi

  # ── Main gate: clippy + test in one job, shared compilation ─────────
  # Clippy checks compile the crate; test reuses those artifacts via
  # cargo's incremental cache in the same runner. Saves ~5 min vs
  # separate jobs that each compile from scratch.
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Cache key covers all 3 feature combos so incremental builds hit.
          shared-key: check-${{ hashFiles('Cargo.lock') }}

      # Clippy (3 feature configurations — shares compilation between runs)
      - name: Clippy (default)
        run: cargo clippy -- -D warnings
      - name: Clippy (graph)
        run: cargo clippy --features graph -- -D warnings
      - name: Clippy (tokio)
        run: cargo clippy --no-default-features --features runtime-tokio,jemalloc -- -D warnings

      # Test — reuses .rlib artifacts from clippy's check compilation above.
      # Only the test harness + test binaries need building (incremental).
      - name: Test
        run: cargo test --no-default-features --features runtime-tokio,jemalloc
        timeout-minutes: 15
      - name: Test (graph)
        run: "cargo test --no-default-features --features runtime-tokio,jemalloc,graph --lib graph::"
        timeout-minutes: 5

  # ── macOS — clippy + test (tokio), clippy (monoio/kqueue) ───────────
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-${{ hashFiles('Cargo.lock') }}
      - name: Clippy (default monoio)
        run: cargo clippy -- -D warnings
      - name: Clippy (tokio)
        run: cargo clippy --no-default-features --features runtime-tokio,jemalloc -- -D warnings
      - name: Test (tokio)
        run: cargo test --no-default-features --features runtime-tokio,jemalloc
        timeout-minutes: 15
      # Cross-build for Intel Mac (build only — no jemalloc: release matrix
      # ships x86_64-macos WITHOUT jemalloc to match what ships in releases.
      # console excluded here: rust_embed requires console/dist/ from `pnpm build`
      # which is not set up in check-macos; console is tested in check-console).
      - name: Add x86_64-apple-darwin target
        run: rustup target add x86_64-apple-darwin
      - name: Build (x86_64-apple-darwin)
        run: cargo build --no-default-features --features runtime-tokio,graph,text-index --target x86_64-apple-darwin

  # ── Windows — main-push only (cost control) ─────────────────────────
  # NOTE: This job is EXPECTED TO FAIL until feat/windows-native-port
  # merges. It is the merge-order gate: that PR must land on main first
  # so this job goes green before the release PR (PR-5) is merged.
  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-${{ hashFiles('Cargo.lock') }}
      # NASM is required by aws-lc-sys (TLS) on Windows.
      # SHA-pinned to v1.5.2 (72793074) for supply-chain safety;
      # choco fallback fires only if the action itself fails.
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b  # v1.5.2
        id: nasm
        continue-on-error: true
      - name: NASM fallback (choco)
        if: steps.nasm.outcome == 'failure'
        run: choco install nasm -y
      - name: Verify cmake available
        run: cmake --version
      # No jemalloc on Windows (tikv-jemallocator does not support MSVC)
      - name: Clippy (windows)
        run: cargo clippy --no-default-features --features runtime-tokio,graph,text-index -- -D warnings
      - name: Test (windows)
        run: cargo test --no-default-features --features runtime-tokio,graph,text-index
        timeout-minutes: 30

  # ── console feature — monoio+jemalloc+graph+text-index+console ───────
  # Catches the monoio+console (tokio-stream) interaction flagged as a risk.
  # pnpm build MUST run before clippy: rust_embed embeds console/dist/ at
  # compile time; without it the console feature builds but embeds nothing.
  # Main-push only — console CI is also covered by console-integration.yml
  # on PRs that touch console/ paths.
  check-console:
    name: Check (console feature)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: console-${{ hashFiles('Cargo.lock') }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install console deps
        working-directory: console
        run: pnpm install --frozen-lockfile
      - name: Build console assets
        working-directory: console
        run: pnpm build
      - name: Clippy (monoio + console)
        run: cargo clippy --no-default-features --features runtime-monoio,jemalloc,graph,text-index,console -- -D warnings

  # ── MSRV — minimal build, different cache key ───────────────────────
  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv-${{ hashFiles('Cargo.lock') }}
      - run: cargo build --no-default-features --features runtime-tokio

  # ── Memory steady-state gate (~4 min) ──────────────────────────────
  # Boots Moon, loads a fixed workload, compares per-kind memory
  # against tests/fixtures/memory-baseline.json within +/-5%.
  # Self-test injects +6% to prove the gate catches regressions.
  memory-steady-state:
    name: Memory steady-state gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: memory-gate-${{ hashFiles('Cargo.lock') }}
      - name: Install redis tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq redis-tools jq
      - name: Build moon
        run: cargo build --no-default-features --features runtime-tokio,jemalloc,graph,text-index
      - name: Run memory steady-state gate (with self-test)
        run: bash scripts/bench-memory-steady-state.sh --self-test --skip-build
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: memory-steady-state-report
          path: /tmp/moon-*.txt
