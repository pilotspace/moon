name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MOON_NO_URING: "1"

jobs:
  # ── Fast lint gate (no cargo build) ──────────────────────────────────
  lint:
    name: Lint (fmt + safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt --check
      - name: Audit unsafe blocks for SAFETY comments
        run: bash scripts/audit-unsafe.sh
      - name: Audit unwrap/expect ratchet
        run: bash scripts/audit-unwrap.sh

  # ── Clippy (needs cargo check, but no full build) ───────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings
      - run: cargo clippy --features graph -- -D warnings
      - run: cargo clippy --no-default-features --features runtime-tokio,jemalloc -- -D warnings

  # ── Test (the big one — build + run) ────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --no-default-features --features runtime-tokio,jemalloc
        timeout-minutes: 15
      - name: Test (graph feature)
        run: "cargo test --no-default-features --features runtime-tokio,jemalloc,graph --lib graph::"
        timeout-minutes: 5

  # ── MSRV — just needs to build, not test ────────────────────────────
  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features --features runtime-tokio

  # ── CHANGELOG check (PR only) ──────────────────────────────────────
  changelog:
    name: CHANGELOG check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md touched or skip-changelog label present
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if echo "$PR_LABELS" | grep -q 'skip-changelog'; then
            echo "skip-changelog label found — skipping check"
            exit 0
          fi
          if git diff origin/main...HEAD --name-only | grep -q CHANGELOG.md; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md not updated. Add an entry or apply 'skip-changelog' label."
            exit 1
          fi
