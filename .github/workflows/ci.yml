name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy -- -D warnings
      - name: Clippy (tokio runtime)
        run: cargo clippy --no-default-features --features runtime-tokio,jemalloc -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --no-default-features --features runtime-tokio,jemalloc
        timeout-minutes: 15
        env:
          MOON_NO_URING: "1"

  safety-audit:
    name: Safety Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit unsafe blocks for SAFETY comments
        run: bash scripts/audit-unsafe.sh
      - name: Audit unwrap/expect ratchet
        run: bash scripts/audit-unwrap.sh

  changelog:
    name: CHANGELOG check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md touched or skip-changelog label present
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if echo "$PR_LABELS" | grep -q 'skip-changelog'; then
            echo "skip-changelog label found — skipping check"
            exit 0
          fi
          if git diff origin/main...HEAD --name-only | grep -q CHANGELOG.md; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md not updated under [Unreleased]. Add a changelog entry or apply the 'skip-changelog' label."
            exit 1
          fi

  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features --features runtime-tokio
