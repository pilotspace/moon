name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-tokio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-tokio,jemalloc
            binary: moon-linux-tokio

          - name: linux-monoio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-monoio,jemalloc
            binary: moon-linux-monoio

          - name: macos-tokio
            os: macos-latest
            target: aarch64-apple-darwin
            features: runtime-tokio,jemalloc
            binary: moon-macos-tokio

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/moon ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "moon $TAG" \
            --generate-notes \
            artifacts/moon-linux-tokio \
            artifacts/moon-linux-monoio \
            artifacts/moon-macos-tokio
