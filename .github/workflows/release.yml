name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip gh release, docker push, homebrew bump)'
        type: boolean
        default: false
      version:
        description: 'Version override for dry_run (e.g. v0.0.0-dryrun)'
        type: string
        default: 'v0.0.0-dryrun'

env:
  CARGO_TERM_COLOR: always

# ─── Job DAG ────────────────────────────────────────────────────────────────
# setup
#   └─ prepare-console
#        └─ build (7 Linux/macOS targets, matrix) + build-windows
#             └─ package (deb/rpm, amd64+arm64)
#                  └─ sign (SHA256SUMS + cosign over ALL artifacts)
#                       └─ release
#                            ├─ docker
#                            └─ homebrew-tap

jobs:
  # ── 0. Centralise version (once) ─────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$IS_DISPATCH" = "true" ]; then
            echo "version=${DISPATCH_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Build web console ──────────────────────────────────────────────────
  prepare-console:
    name: Build Console
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: console
        run: pnpm install --frozen-lockfile

      - name: Build console
        working-directory: console
        run: pnpm build

      - name: Verify console build
        run: |
          if [ ! -f console/dist/index.html ]; then
            echo "::error::console/dist/index.html missing after pnpm build"
            exit 1
          fi

      - name: Upload console-dist
        uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: console/dist/
          retention-days: 1

  # ── 2a. Build matrix (Linux / macOS targets) ──────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: [setup, prepare-console]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1) x86_64 Linux monoio
          - name: x86_64-linux-monoio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-monoio,jemalloc,graph,text-index,console

          # 2) x86_64 Linux tokio
          - name: x86_64-linux-tokio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-tokio,jemalloc,graph,text-index,console

          # 3) aarch64 Linux tokio (cross)
          - name: aarch64-linux-tokio
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: runtime-tokio,jemalloc,graph,text-index,console
            cross: true

          # 4) x86_64 Linux musl tokio
          - name: x86_64-linux-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            features: runtime-tokio,jemalloc,graph,text-index,console
            musl: true

          # 5) aarch64 Linux musl tokio (cross)
          - name: aarch64-linux-musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            features: runtime-tokio,jemalloc,graph,text-index,console
            cross: true

          # 6) aarch64 macOS tokio
          - name: aarch64-macos
            os: macos-latest
            target: aarch64-apple-darwin
            features: runtime-tokio,jemalloc,graph,text-index,console

          # 7) x86_64 macOS tokio (cross from arm64 runner, NO jemalloc)
          - name: x86_64-macos
            os: macos-latest
            target: x86_64-apple-darwin
            features: runtime-tokio,graph,text-index,console
            add_target: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Add cross target (macOS Intel)
        if: matrix.add_target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (aarch64/musl builds)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install musl-tools (x86_64 musl)
        if: matrix.musl
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Download console-dist
        uses: actions/download-artifact@v4
        with:
          name: console-dist
          path: console/dist/

      - name: Build
        env:
          CROSS: ${{ matrix.cross }}
          FEATURES: ${{ matrix.features }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "${CROSS}" = "true" ]; then
            cross build --release --bin moon --no-default-features --features "$FEATURES" --target "$TARGET"
          else
            cargo build --release --bin moon --no-default-features --features "$FEATURES" --target "$TARGET"
          fi

      - name: Package archive
        env:
          VER: ${{ needs.setup.outputs.version }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE_DIR="moon-${VER}-${NAME}"
          ARTIFACT_NAME="${ARCHIVE_DIR}.tar.gz"
          mkdir -p "$ARCHIVE_DIR"
          cp "target/$TARGET/release/moon" "$ARCHIVE_DIR/moon"
          cp LICENSE "$ARCHIVE_DIR/LICENSE"
          cp README.md "$ARCHIVE_DIR/README.md"
          # moon.conf.example provided by PR-3 (B2); include if present
          if [ -f packaging/moon.conf.example ]; then
            cp packaging/moon.conf.example "$ARCHIVE_DIR/moon.conf.example"
          fi
          tar czf "$ARTIFACT_NAME" "$ARCHIVE_DIR"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 1

  # ── 2b. Build Windows ─────────────────────────────────────────────────────
  build-windows:
    name: Build x86_64-windows
    needs: [setup, prepare-console]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Setup NASM (required by aws-lc-rs)
        uses: ilammy/setup-nasm@v1

      - name: Download console-dist
        uses: actions/download-artifact@v4
        with:
          name: console-dist
          path: console/dist/

      - name: Build
        shell: bash
        run: |
          cargo build --release --bin moon \
            --no-default-features \
            --features runtime-tokio,graph,text-index,console \
            --target x86_64-pc-windows-msvc

      - name: Package zip
        env:
          VER: ${{ needs.setup.outputs.version }}
        shell: pwsh
        run: |
          $archiveDir = "moon-$env:VER-x86_64-windows"
          New-Item -ItemType Directory -Path $archiveDir | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\moon.exe" "$archiveDir\moon.exe"
          Copy-Item "LICENSE" "$archiveDir\LICENSE"
          Copy-Item "README.md" "$archiveDir\README.md"
          if (Test-Path "packaging\moon.conf.example") {
            Copy-Item "packaging\moon.conf.example" "$archiveDir\moon.conf.example"
          }
          Compress-Archive -Path $archiveDir -DestinationPath "moon-$env:VER-x86_64-windows.zip"

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: moon-${{ needs.setup.outputs.version }}-x86_64-windows.zip
          path: moon-${{ needs.setup.outputs.version }}-x86_64-windows.zip
          retention-days: 1

  # ── 3. Build deb/rpm packages ─────────────────────────────────────────────
  package:
    name: Package ${{ matrix.arch }} (deb/rpm)
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            tarball_name: x86_64-linux-tokio
            nfpm_arch: amd64
          - arch: arm64
            tarball_name: aarch64-linux-tokio
            nfpm_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download tokio tarball
        uses: actions/download-artifact@v4
        with:
          name: moon-${{ needs.setup.outputs.version }}-${{ matrix.tarball_name }}.tar.gz
          path: dist/

      - name: Extract binary from tarball
        env:
          VER: ${{ needs.setup.outputs.version }}
          SUFFIX: ${{ matrix.tarball_name }}
        run: |
          mkdir -p target/release
          # Extract all members with --strip-components=1 (avoids GNU tar
          # wildcard-matching quirks). Lands moon + LICENSE + README in
          # target/release/; nfpm.yml references ../target/release/moon.
          tar xzf "dist/moon-${VER}-${SUFFIX}.tar.gz" --strip-components=1 -C target/release/
          chmod +x target/release/moon

      - name: Install nfpm
        env:
          NFPM_VERSION: "2.46.1"
        run: |
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin nfpm

      - name: Build deb and rpm
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          # Strip the 'v' prefix and re-export VERSION so nfpm.yml reads the
          # numeric version (e.g. "0.2.0"). Debian policy requires versions to
          # start with a digit; dpkg rejects packages whose Version field
          # begins with 'v'.
          VERSION="${VERSION#v}"
          VER="$VERSION"
          export VERSION
          cd packaging
          nfpm package --packager deb --config nfpm.yml --target "../moon_${VER}_${ARCH}.deb"
          nfpm package --packager rpm --config nfpm.yml --target "../moon-${VER}-1.${ARCH}.rpm"
          echo "VER_STRIP=${VER}" >> "$GITHUB_ENV"

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: moon_${{ env.VER_STRIP }}_${{ matrix.nfpm_arch }}.deb
          path: moon_${{ env.VER_STRIP }}_${{ matrix.nfpm_arch }}.deb
          retention-days: 1

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: moon-${{ env.VER_STRIP }}-1.${{ matrix.nfpm_arch }}.rpm
          path: moon-${{ env.VER_STRIP }}-1.${{ matrix.nfpm_arch }}.rpm
          retention-days: 1

  # ── 4. Sign all artifacts ─────────────────────────────────────────────────
  sign:
    name: Sign Artifacts
    needs: [setup, build, build-windows, package]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@1.94.1

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOMs
        run: |
          # Per-variant SBOMs so each binary has an accurate dependency graph.
          cargo cyclonedx --format json --no-default-features \
            --features runtime-tokio,jemalloc,graph,text-index,console \
            --override-filename moon-sbom-tokio
          cargo cyclonedx --format json --no-default-features \
            --features runtime-monoio,jemalloc,graph,text-index,console \
            --override-filename moon-sbom-monoio
          # Combined superset SBOM.
          cargo cyclonedx --format json --override-filename moon-sbom
          mv moon-sbom-tokio.json artifacts/moon-sbom-tokio.json
          mv moon-sbom-monoio.json artifacts/moon-sbom-monoio.json
          mv moon-sbom.json artifacts/moon-sbom.json

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          # moon* captures both moon-... (tarballs/zip/rpm/sbom) and moon_... (deb)
          sha256sum moon* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign all artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign every artifact; skip signing outputs from a previous pass.
          # --output-certificate is required for downstream verification:
          # keyless `cosign verify-blob` needs the Fulcio certificate
          # alongside the signature — a bare .sig is unverifiable.
          for f in artifacts/moon*; do
            [[ "$f" == *.sig || "$f" == *.crt ]] && continue
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt"
          done
          # Also sign the checksum manifest
          cosign sign-blob --yes artifacts/SHA256SUMS.txt \
            --output-signature artifacts/SHA256SUMS.txt.sig \
            --output-certificate artifacts/SHA256SUMS.txt.crt

      - name: Upload signed artifacts bundle
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts
          path: artifacts/
          retention-days: 1

  # ── 5. Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: [setup, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-release-artifacts
          path: artifacts/

      - name: Create release (or dry-run echo)
        env:
          GH_TOKEN: ${{ github.token }}
          # This job never checks out the repo (it only downloads artifacts),
          # so `gh` cannot infer the repository from a git remote — it dies
          # with "fatal: not a git repository" (first seen on v0.2.0-rc.1).
          # GH_REPO pins the target explicitly.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.setup.outputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # Determine prerelease flag: tag contains '-' (e.g. v0.2.0-rc.1)
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -q -- '-'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — would run:"
            echo "  gh release create $TAG $PRERELEASE_FLAG --title 'moon $TAG' --generate-notes \\"
            echo "    artifacts/moon-* artifacts/moon_* artifacts/SHA256SUMS* artifacts/moon-sbom*.json"
          else
            # artifacts/moon-* covers tarballs, zip, rpm, sbom-*.json, *.sig, *.crt
            # artifacts/moon_* covers deb (underscore naming from nfpm)
            # SHA256SUMS.txt{,.sig,.crt} are not moon-prefixed: explicit
            gh release create "$TAG" \
              $PRERELEASE_FLAG \
              --title "moon $TAG" \
              --generate-notes \
              artifacts/moon-* \
              artifacts/moon_* \
              artifacts/SHA256SUMS.txt \
              artifacts/SHA256SUMS.txt.sig \
              artifacts/SHA256SUMS.txt.crt
          fi

  # ── 6. Docker image ───────────────────────────────────────────────────────
  # The Dockerfile is a full source build (cargo-chef multi-stage); it does
  # not consume prebuilt binaries. context: . supplies the full source tree.
  docker:
    name: Docker Image
    needs: [setup, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and Docker tags
        id: version
        env:
          VER: ${{ needs.setup.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${VER#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Only stable releases move :latest — a prerelease tag (contains
          # '-', e.g. v0.2.0-rc.1) must not repoint the default pull tag at
          # an RC. The versioned tag is always pushed.
          TAGS="ghcr.io/${REPO}:${VERSION}"
          if [[ "$VERSION" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ inputs.dry_run != true }}
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ── 7. Homebrew tap bump ───────────────────────────────────────────────────
  homebrew-tap:
    name: Bump Homebrew Tap
    needs: [setup, sign, release]
    runs-on: ubuntu-latest
    # Skip on prerelease tags (contains '-') and dry_run.
    # Gated behind the HOMEBREW_TAP_ENABLED repo variable: Homebrew
    # distribution is deferred (no tap repo / HOMEBREW_TAP_TOKEN secret yet),
    # and without the gate bump-homebrew.sh would hard-fail on every stable
    # tag at its `:?` validation of the missing secret. To enable later:
    # create pilotspace/homebrew-moon + the token secret, then set the
    # repo variable HOMEBREW_TAP_ENABLED=true.
    if: >-
      !contains(needs.setup.outputs.version, '-') &&
      inputs.dry_run != true &&
      vars.HOMEBREW_TAP_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Bump homebrew formula
        env:
          TAG: ${{ needs.setup.outputs.version }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: bash packaging/bump-homebrew.sh
