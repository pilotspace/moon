name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-tokio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-tokio,jemalloc
            binary: moon-linux-tokio

          - name: linux-monoio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-monoio,jemalloc
            binary: moon-linux-monoio

          - name: macos-tokio
            os: macos-latest
            target: aarch64-apple-darwin
            features: runtime-tokio,jemalloc
            binary: moon-macos-tokio

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          cargo build --release --no-default-features --features ${{ matrix.features }} --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/moon ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@1.94.1

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOMs
        run: |
          # Per-variant SBOMs so each binary has an accurate dependency graph.
          cargo cyclonedx --format json --no-default-features --features runtime-tokio,jemalloc \
            --output-file artifacts/moon-sbom-tokio.json
          cargo cyclonedx --format json --no-default-features --features runtime-monoio,jemalloc \
            --output-file artifacts/moon-sbom-monoio.json
          # Combined superset SBOM for convenience (covers all variants).
          cargo cyclonedx --format json --output-file artifacts/moon-sbom.json

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum moon-linux-tokio moon-linux-monoio moon-macos-tokio moon-sbom.json moon-sbom-tokio.json moon-sbom-monoio.json > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in artifacts/moon-*; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "moon $TAG" \
            --generate-notes \
            artifacts/moon-linux-tokio \
            artifacts/moon-linux-monoio \
            artifacts/moon-macos-tokio \
            artifacts/moon-sbom.json \
            artifacts/moon-sbom-tokio.json \
            artifacts/moon-sbom-monoio.json \
            artifacts/SHA256SUMS.txt \
            artifacts/moon-*.sig
