name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-tokio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-tokio,jemalloc
            binary: moon-linux-tokio

          - name: linux-monoio
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: runtime-monoio,jemalloc
            binary: moon-linux-monoio

          - name: linux-aarch64-tokio
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: runtime-tokio,jemalloc
            binary: moon-linux-aarch64-tokio
            cross: true

          - name: linux-musl-tokio
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            features: runtime-tokio,jemalloc
            binary: moon-linux-musl-tokio
            musl: true

          - name: linux-aarch64-musl-tokio
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            features: runtime-tokio,jemalloc
            binary: moon-linux-aarch64-musl-tokio
            cross: true

          - name: macos-tokio
            os: macos-latest
            target: aarch64-apple-darwin
            features: runtime-tokio,jemalloc
            binary: moon-macos-tokio

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross (aarch64/musl-cross)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Install musl-tools (x86_64 musl)
        if: matrix.musl
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Build
        env:
          CROSS: ${{ matrix.cross }}
          FEATURES: ${{ matrix.features }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          if [ "$CROSS" = "true" ]; then
            cross build --release --no-default-features --features "$FEATURES" --target "$TARGET"
          else
            cargo build --release --no-default-features --features "$FEATURES" --target "$TARGET"
          fi
          cp "target/$TARGET/release/moon" "$BINARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v8
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@1.94.1

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOMs
        run: |
          # Per-variant SBOMs so each binary has an accurate dependency graph.
          # cargo-cyclonedx v0.5+ writes to <override-filename>.json in the manifest dir.
          cargo cyclonedx --format json --no-default-features --features runtime-tokio,jemalloc \
            --override-filename moon-sbom-tokio
          cargo cyclonedx --format json --no-default-features --features runtime-monoio,jemalloc \
            --override-filename moon-sbom-monoio
          # Combined superset SBOM for convenience (covers all variants).
          cargo cyclonedx --format json --override-filename moon-sbom
          mv moon-sbom-tokio.json artifacts/moon-sbom-tokio.json
          mv moon-sbom-monoio.json artifacts/moon-sbom-monoio.json
          mv moon-sbom.json artifacts/moon-sbom.json

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum moon-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in artifacts/moon-*; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "moon $TAG" \
            --generate-notes \
            artifacts/moon-linux-* \
            artifacts/moon-macos-* \
            artifacts/moon-sbom*.json \
            artifacts/SHA256SUMS.txt

  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: moon-linux-*
          path: artifacts/
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  package:
    name: Build Packages (deb/rpm)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: amd64
            binary: moon-linux-tokio
            nfpm_arch: amd64
          - arch: arm64
            binary: moon-linux-aarch64-tokio
            nfpm_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.binary }}
          path: target/release/

      - name: Prepare binary
        run: |
          mv "target/release/${{ matrix.binary }}" target/release/moon
          chmod +x target/release/moon

      - name: Install nfpm
        env:
          NFPM_VERSION: "2.46.1"
        run: |
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin nfpm

      - name: Build deb
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          export VERSION="${VERSION#v}"
          cd packaging
          nfpm package --packager deb --target "../moon_${VERSION}_${ARCH}.deb"

      - name: Build rpm
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
        run: |
          export VERSION="${VERSION#v}"
          cd packaging
          nfpm package --packager rpm --target "../moon-${VERSION}-1.${ARCH}.rpm"

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          gh release upload "$TAG" \
            "moon_${VER}_${ARCH}.deb" \
            "moon-${VER}-1.${ARCH}.rpm" \
            --clobber
