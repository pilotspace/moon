name: Console Integration
on:
  pull_request:
    paths:
      - "console/**"
      - "src/admin/**"
      - "src/vector/**"
      - "scripts/test-integration.sh"
      - "scripts/seed-console-fixtures.py"
      - ".github/workflows/console-integration.yml"
  workflow_dispatch: {}

jobs:
  integration:
    runs-on: ubuntu-24.04
    env:
      MOON_NO_URING: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install python deps
        # redis-py majors change protocol behaviour (8.0 made RESP3 the
        # default handshake) — pin the major so the harness doesn't drift.
        run: python -m pip install --upgrade pip numpy "redis>=8,<9"
      - name: Run integration harness
        run: bash scripts/test-integration.sh
