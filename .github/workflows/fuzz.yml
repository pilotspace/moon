name: Fuzz

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz-pr:
    if: github.event_name == 'pull_request'
    name: Fuzz (15m)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - resp_parse
          - resp_parse_differential
          - inline_parse
          - wal_v3_record
          - gossip_deser
          - acl_rule
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzzer
        run: cargo fuzz run "$TARGET" -- -max_total_time=900 -max_len=65536
        env:
          MOON_NO_URING: "1"
          TARGET: ${{ matrix.target }}

  fuzz-nightly:
    if: github.event_name == 'schedule'
    name: Fuzz nightly (6h)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - resp_parse
          - resp_parse_differential
          - inline_parse
          - wal_v3_record
          - gossip_deser
          - acl_rule
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzzer (6h)
        run: cargo fuzz run "$TARGET" -- -max_total_time=21600 -max_len=65536
        env:
          MOON_NO_URING: "1"
          TARGET: ${{ matrix.target }}
      - name: Archive corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus
          path: fuzz/corpus/
          retention-days: 30
