name: Fuzz

on:
  pull_request:
    branches: [main]
    types: [labeled]
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz-pr:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-fuzz')
    name: Fuzz PR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - resp_parse
          - resp_parse_differential
          - inline_parse
          - wal_v3_record
          - gossip_deser
          - acl_rule
          - rdb_load
          - cypher_parse
          - conf_parse
          - csr_from_bytes
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Override rust-toolchain.toml for nightly
        run: rm -f rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz-nightly
      - name: Install cargo-fuzz
        # Prebuilt binary: `cargo install --locked` broke when nightly started
        # rejecting the lockfile's rustix 0.36.5 (reserved `rustc_*` attrs);
        # a binary install is immune to toolchain drift and faster.
        uses: taiki-e/install-action@4bc351f7f2614e48088386e2a0ad917ca3a7e4ba # v2.81.5
        with:
          tool: cargo-fuzz
      - name: Download nightly corpus
        uses: actions/download-artifact@v4
        with:
          name: fuzz-corpus
          path: fuzz/corpus/
        continue-on-error: true
      - name: Run fuzzer (15m, multi-process)
        run: cargo +nightly fuzz run "$TARGET" -- -max_total_time=900 -max_len=65536 -fork=2 -ignore_crashes=0
        env:
          MOON_NO_URING: "1"
          TARGET: ${{ matrix.target }}

  fuzz-nightly:
    if: github.event_name == 'schedule'
    name: Fuzz nightly
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - resp_parse
          - resp_parse_differential
          - inline_parse
          - wal_v3_record
          - gossip_deser
          - acl_rule
          - rdb_load
          - cypher_parse
          - conf_parse
          - csr_from_bytes
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Override rust-toolchain.toml for nightly
        run: rm -f rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz-nightly
      - name: Install cargo-fuzz
        # Prebuilt binary: `cargo install --locked` broke when nightly started
        # rejecting the lockfile's rustix 0.36.5 (reserved `rustc_*` attrs);
        # a binary install is immune to toolchain drift and faster.
        uses: taiki-e/install-action@4bc351f7f2614e48088386e2a0ad917ca3a7e4ba # v2.81.5
        with:
          tool: cargo-fuzz
      - name: Download previous corpus
        uses: actions/download-artifact@v4
        with:
          name: fuzz-corpus
          path: fuzz/corpus/
        continue-on-error: true
      - name: Run fuzzer (6h, multi-process)
        run: cargo +nightly fuzz run "$TARGET" -- -max_total_time=21600 -max_len=65536 -fork=2 -ignore_crashes=0
        env:
          MOON_NO_URING: "1"
          TARGET: ${{ matrix.target }}
      - name: Archive corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus
          path: fuzz/corpus/
          retention-days: 30
