name: Client Compatibility

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  redis-py:
    name: redis-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon (tokio)
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
        env:
          MOON_NO_URING: "1"
      - name: Start Moon
        run: |
          ./target/release/moon --port 6399 --shards 1 &
          sleep 2
        env:
          MOON_NO_URING: "1"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install redis-py
        run: pip install redis
      - name: Run compatibility tests
        run: |
          python -c "
          import redis
          r = redis.Redis(host='127.0.0.1', port=6399)
          # Basic operations
          r.set('test_key', 'test_value')
          assert r.get('test_key') == b'test_value'
          r.delete('test_key')
          assert r.get('test_key') is None
          # Hash
          r.hset('hash_key', mapping={'f1': 'v1', 'f2': 'v2'})
          assert r.hget('hash_key', 'f1') == b'v1'
          assert r.hlen('hash_key') == 2
          # List
          r.rpush('list_key', 'a', 'b', 'c')
          assert r.llen('list_key') == 3
          assert r.lrange('list_key', 0, -1) == [b'a', b'b', b'c']
          # Set
          r.sadd('set_key', 'a', 'b', 'c')
          assert r.scard('set_key') == 3
          assert r.sismember('set_key', 'a')
          # Sorted set
          r.zadd('zset_key', {'a': 1.0, 'b': 2.0, 'c': 3.0})
          assert r.zcard('zset_key') == 3
          # Pipeline
          pipe = r.pipeline()
          pipe.set('p1', 'v1')
          pipe.set('p2', 'v2')
          pipe.get('p1')
          pipe.get('p2')
          results = pipe.execute()
          assert results == [True, True, b'v1', b'v2']
          # INFO
          info = r.info()
          assert 'redis_version' in info
          print('redis-py: ALL TESTS PASSED')
          "

  go-redis:
    name: go-redis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon (tokio)
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
        env:
          MOON_NO_URING: "1"
      - name: Start Moon
        run: |
          ./target/release/moon --port 6399 --shards 1 &
          sleep 2
        env:
          MOON_NO_URING: "1"
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run go-redis smoke test
        run: |
          cat > /tmp/compat_test.go << 'GOEOF'
          package main
          import (
            "context"
            "fmt"
            "github.com/redis/go-redis/v9"
          )
          func main() {
            ctx := context.Background()
            rdb := redis.NewClient(&redis.Options{Addr: "127.0.0.1:6399"})
            defer rdb.Close()
            rdb.Set(ctx, "go_key", "go_value", 0)
            val, _ := rdb.Get(ctx, "go_key").Result()
            if val != "go_value" { panic("GET failed") }
            rdb.HSet(ctx, "go_hash", "f1", "v1")
            hval, _ := rdb.HGet(ctx, "go_hash", "f1").Result()
            if hval != "v1" { panic("HGET failed") }
            fmt.Println("go-redis: ALL TESTS PASSED")
          }
          GOEOF
          cd /tmp && go mod init compat && go get github.com/redis/go-redis/v9 && go run compat_test.go
