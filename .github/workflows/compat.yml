name: Client Compatibility

on:
  pull_request:
    branches: [main]
    paths: ['src/**']
  schedule:
    - cron: '0 4 * * 1'

concurrency:
  group: compat-${{ github.ref }}
  cancel-in-progress: true

env:
  MOON_NO_URING: "1"

jobs:
  # ── Core clients: always run on PR ──────────────────────────────────
  redis-py:
    name: redis-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
      - name: Start Moon
        run: ./target/release/moon --port 6399 --shards 1 & sleep 2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install redis
      - name: Run tests
        run: |
          python -c "
          import redis
          r = redis.Redis(host='127.0.0.1', port=6399)
          r.set('test_key', 'test_value')
          assert r.get('test_key') == b'test_value'
          r.delete('test_key')
          assert r.get('test_key') is None
          r.hset('hash_key', mapping={'f1': 'v1', 'f2': 'v2'})
          assert r.hget('hash_key', 'f1') == b'v1'
          r.rpush('list_key', 'a', 'b', 'c')
          assert r.lrange('list_key', 0, -1) == [b'a', b'b', b'c']
          r.sadd('set_key', 'a', 'b', 'c')
          assert r.scard('set_key') == 3
          r.zadd('zset_key', {'a': 1.0, 'b': 2.0, 'c': 3.0})
          assert r.zcard('zset_key') == 3
          pipe = r.pipeline()
          pipe.set('p1', 'v1'); pipe.set('p2', 'v2'); pipe.get('p1'); pipe.get('p2')
          assert pipe.execute() == [True, True, b'v1', b'v2']
          info = r.info()
          assert 'redis_version' in info
          print('redis-py: ALL TESTS PASSED')
          "

  ioredis:
    name: ioredis (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
      - name: Start Moon
        run: ./target/release/moon --port 6399 --shards 1 & sleep 2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install ioredis
      - name: Run tests
        run: |
          node -e "
          const Redis = require('ioredis');
          (async () => {
            const r = new Redis({ host: '127.0.0.1', port: 6399, lazyConnect: true });
            await r.connect();
            await r.set('node_key', 'node_value');
            if (await r.get('node_key') !== 'node_value') throw new Error('GET failed');
            await r.hset('node_hash', 'f1', 'v1');
            if (await r.hget('node_hash', 'f1') !== 'v1') throw new Error('HGET failed');
            const pipe = r.pipeline();
            pipe.set('np1', 'pv1'); pipe.set('np2', 'pv2'); pipe.get('np1'); pipe.get('np2');
            const results = await pipe.exec();
            if (results[2][1] !== 'pv1') throw new Error('pipeline failed');
            console.log('ioredis: ALL TESTS PASSED');
            await r.quit();
          })();
          "

  redis-rs:
    name: redis-rs (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
      - name: Start Moon
        run: ./target/release/moon --port 6399 --shards 1 & sleep 2
      - name: Run tests
        run: |
          TMPDIR=$(mktemp -d)
          cat > "$TMPDIR/Cargo.toml" << 'EOF'
          [package]
          name = "moon-compat"
          version = "0.1.0"
          edition = "2021"
          [dependencies]
          redis = "0.27"
          EOF
          mkdir -p "$TMPDIR/src"
          cat > "$TMPDIR/src/main.rs" << 'EOF'
          use redis::Commands;
          fn main() {
              let client = redis::Client::open("redis://127.0.0.1:6399/").unwrap();
              let mut con = client.get_connection().unwrap();
              let _: () = con.set("rs_key", "rs_value").unwrap();
              assert_eq!(con.get::<_, String>("rs_key").unwrap(), "rs_value");
              let _: () = con.hset("rs_hash", "f1", "v1").unwrap();
              assert_eq!(con.hget::<_, _, String>("rs_hash", "f1").unwrap(), "v1");
              let (r1, r2): (String, String) = redis::pipe()
                  .cmd("SET").arg("rp1").arg("pv1").ignore()
                  .cmd("SET").arg("rp2").arg("pv2").ignore()
                  .cmd("GET").arg("rp1")
                  .cmd("GET").arg("rp2")
                  .query(&mut con).unwrap();
              assert_eq!(r1, "pv1");
              assert_eq!(r2, "pv2");
              println!("redis-rs: ALL TESTS PASSED");
          }
          EOF
          cd "$TMPDIR" && cargo run --release

  # ── Extended clients: weekly schedule only ──────────────────────────
  go-redis:
    name: go-redis
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
      - name: Start Moon
        run: ./target/release/moon --port 6399 --shards 1 & sleep 2
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: |
          GOTEST_DIR=$(mktemp -d)
          cat > "$GOTEST_DIR/main.go" << 'GOEOF'
          package main
          import ("context"; "fmt"; "github.com/redis/go-redis/v9")
          func main() {
            ctx := context.Background()
            rdb := redis.NewClient(&redis.Options{Addr: "127.0.0.1:6399"})
            defer rdb.Close()
            rdb.Set(ctx, "go_key", "go_value", 0)
            val, _ := rdb.Get(ctx, "go_key").Result()
            if val != "go_value" { panic("GET failed") }
            fmt.Println("go-redis: ALL TESTS PASSED")
          }
          GOEOF
          cd "$GOTEST_DIR" && go mod init compat && go mod tidy && go run main.go

  hiredis:
    name: hiredis (C)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
      - name: Start Moon
        run: ./target/release/moon --port 6399 --shards 1 & sleep 2
      - run: sudo apt-get install -y libhiredis-dev
      - name: Run tests
        run: |
          cat > /tmp/test.c << 'CEOF'
          #include <stdio.h>
          #include <string.h>
          #include <hiredis/hiredis.h>
          int main() {
              redisContext *c = redisConnect("127.0.0.1", 6399);
              if (!c || c->err) return 1;
              redisReply *r = redisCommand(c, "SET c_key c_value"); freeReplyObject(r);
              r = redisCommand(c, "GET c_key");
              if (strcmp(r->str, "c_value")) return 1;
              freeReplyObject(r);
              printf("hiredis: ALL TESTS PASSED\n");
              redisFree(c);
              return 0;
          }
          CEOF
          gcc -o /tmp/test /tmp/test.c -lhiredis && /tmp/test

  jedis:
    name: jedis (Java)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build Moon
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
      - name: Start Moon
        run: ./target/release/moon --port 6399 --shards 1 & sleep 2
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run tests
        env:
          JEDIS_VERSION: "5.2.0"
          SLF4J_VERSION: "2.0.16"
          POOL_VERSION: "2.12.0"
          GSON_VERSION: "2.11.0"
        run: |
          mkdir -p /tmp/jedis-test
          curl -sL "https://repo1.maven.org/maven2/redis/clients/jedis/${JEDIS_VERSION}/jedis-${JEDIS_VERSION}.jar" -o /tmp/jedis-test/jedis.jar
          curl -sL "https://repo1.maven.org/maven2/org/slf4j/slf4j-api/${SLF4J_VERSION}/slf4j-api-${SLF4J_VERSION}.jar" -o /tmp/jedis-test/slf4j-api.jar
          curl -sL "https://repo1.maven.org/maven2/org/slf4j/slf4j-simple/${SLF4J_VERSION}/slf4j-simple-${SLF4J_VERSION}.jar" -o /tmp/jedis-test/slf4j-simple.jar
          curl -sL "https://repo1.maven.org/maven2/org/apache/commons/commons-pool2/${POOL_VERSION}/commons-pool2-${POOL_VERSION}.jar" -o /tmp/jedis-test/commons-pool2.jar
          curl -sL "https://repo1.maven.org/maven2/com/google/gson/gson/${GSON_VERSION}/gson-${GSON_VERSION}.jar" -o /tmp/jedis-test/gson.jar
          cat > /tmp/jedis-test/Test.java << 'JEOF'
          import redis.clients.jedis.Jedis;
          public class Test {
              public static void main(String[] args) {
                  try (Jedis j = new Jedis("127.0.0.1", 6399)) {
                      j.set("java_key", "java_value");
                      assert "java_value".equals(j.get("java_key"));
                      System.out.println("jedis: ALL TESTS PASSED");
                  }
              }
          }
          JEOF
          cd /tmp/jedis-test && javac -cp "jedis.jar:commons-pool2.jar:slf4j-api.jar:gson.jar" Test.java
          cd /tmp/jedis-test && java -ea -cp ".:jedis.jar:commons-pool2.jar:slf4j-api.jar:slf4j-simple.jar:gson.jar" Test
