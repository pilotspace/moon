name: Performance Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'benches/**'

jobs:
  bench-regression:
    name: Criterion Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Build benchmarks
        run: cargo build --release --benches --no-default-features --features runtime-tokio,jemalloc
        env:
          MOON_NO_URING: "1"
      - name: Run all benchmarks
        run: |
          cargo bench --no-default-features --features runtime-tokio,jemalloc \
            --bench get_hotpath \
            --bench dispatch_baseline \
            --bench resp_parsing \
            --bench pubsub_hotpath \
            --bench distance_bench \
            --bench hnsw_bench \
            --bench fwht_bench \
            --bench entry_memory \
            --bench compact_key \
            --bench bptree_memory \
            -- --output-format bencher 2>&1 | tee bench_results.txt
        env:
          MOON_NO_URING: "1"
      - name: Check for benchmark failures
        run: |
          if [ ! -s bench_results.txt ]; then
            echo "ERROR: Benchmark output is empty — benchmarks may have failed to run."
            exit 1
          fi
          # Fail if Criterion reported any errors
          if grep -qi 'error\|panicked\|FAILED' bench_results.txt; then
            echo "ERROR: Benchmark run contained errors:"
            grep -i 'error\|panicked\|FAILED' bench_results.txt
            exit 1
          fi
          echo "Benchmarks completed successfully."
          # NOTE: To gate on regressions, use Criterion's --save-baseline / --baseline
          # flags to compare against a known-good run. For example:
          #   cargo bench ... -- --save-baseline main   (on main branch)
          #   cargo bench ... -- --baseline main         (on PR branch, exits non-zero on regression)
      - name: Archive benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench_results.txt
          retention-days: 90

  memory-regression:
    name: RSS Memory Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: Install redis-tools
        run: sudo apt-get install -y redis-tools
      - name: Build release
        run: cargo build --release --no-default-features --features runtime-tokio,jemalloc
        env:
          MOON_NO_URING: "1"
      - name: Measure RSS after 100K keys
        env:
          MOON_NO_URING: "1"
          KEY_COUNT: "100000"
        run: |
          ./target/release/moon --port 6399 --shards 1 &
          MOON_PID=$!
          sleep 2
          # Write 100K unique keys
          redis-benchmark -h 127.0.0.1 -p 6399 -t set -n "${KEY_COUNT}" -r "${KEY_COUNT}" -q
          sleep 1
          # Read RSS from /proc
          RSS_KB=$(awk '/VmRSS/ {print $2}' /proc/${MOON_PID}/status)
          RSS_MB=$((RSS_KB / 1024))
          echo "RSS after ${KEY_COUNT} keys: ${RSS_MB} MB (${RSS_KB} KB)"
          echo "rss_mb=${RSS_MB}" >> "$GITHUB_OUTPUT"
          # Baseline: 150 MB for 100K keys is generous upper bound
          BASELINE_MB=150
          if [ "${RSS_MB}" -gt "${BASELINE_MB}" ]; then
            echo "WARNING: RSS ${RSS_MB} MB exceeds baseline ${BASELINE_MB} MB"
            echo "Review memory usage before merging."
          fi
          kill ${MOON_PID} 2>/dev/null || true
